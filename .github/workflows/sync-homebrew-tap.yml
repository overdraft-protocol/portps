name: Sync Homebrew tap

# Pushes Formula/portps.rb to overdraft-protocol/homebrew-portps on GitHub Release.
#
# Required secret on this repo (portps):
#   HOMEBREW_TAP_SSH_KEY — private half of a write deploy key registered on
#                          overdraft-protocol/homebrew-portps
#
# Setup: see README "Distribution" / steps below in this file's PR description.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to sync (e.g. 1.1.0 or v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy key secret
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
        run: |
          if [ -z "$HOMEBREW_TAP_SSH_KEY" ]; then
            echo "::error::Add repository secret HOMEBREW_TAP_SSH_KEY (private key for a write deploy key on overdraft-protocol/homebrew-portps)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          # Update formula on the default branch even when the job runs for a tag.
          ref: ${{ github.event.repository.default_branch }}

      - name: Start SSH agent with deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${{ github.event.release.tag_name }}"
          fi
          RAW="${RAW#v}"
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW" >> "$GITHUB_OUTPUT"

      - name: Sync formula to homebrew-portps
        env:
          HOMEBREW_TAP_REPO: overdraft-protocol/homebrew-portps
        run: |
          chmod +x scripts/sync-homebrew-tap.sh
          ./scripts/sync-homebrew-tap.sh "${{ steps.ver.outputs.version }}"

      - name: Commit updated Formula in this repo
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/portps.rb
          if git diff --staged --quiet; then
            echo "Local Formula already current"
            exit 0
          fi
          git commit -m "chore: bump Homebrew formula for ${{ steps.ver.outputs.tag }}"
          git push
